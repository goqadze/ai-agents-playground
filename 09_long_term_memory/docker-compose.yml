services:
  postgres:
    image: postgres:16-alpine
    container_name: ltm_postgres
    environment:
      POSTGRES_DB:       memorydb
      POSTGRES_USER:     memuser
      POSTGRES_PASSWORD: mempass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memuser -d memorydb"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
